name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  codeql:
    uses: scottobert/deployment-pipeline/.github/workflows/codeql.yml@main
    permissions:
      actions: read
      contents: read
      security-events: write

  test:
    uses: scottobert/deployment-pipeline/.github/workflows/test.yml@main
    with:
      node-versions: '["18", "20", "22", "24"]'

  sonar:
    needs: test
    uses: scottobert/deployment-pipeline/.github/workflows/sonar.yml@main
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  release:
    needs: [codeql, test, sonar]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    uses: scottobert/deployment-pipeline/.github/workflows/semantic-release.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
